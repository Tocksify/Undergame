kind = "web"
previewPath = "/"
title = "Echo Realm"
version = "1.0.0"
id = "artifacts/echo-realm"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19761

[services.development]
run = "pnpm --filter @workspace/echo-realm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echo-realm", "run", "build" ]
serve = "static"
publicDir = "artifacts/echo-realm/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19761"
BASE_PATH = "/"
