openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Account authentication
  - name: saves
    description: Save slot persistence
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerAccount
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid input or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginAccount
      tags: [auth]
      summary: Log in to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutAccount
      tags: [auth]
      summary: Log out of the current session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentAccount
      tags: [auth]
      summary: Get the account for the current session token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saves:
    get:
      operationId: listSaveSlots
      tags: [saves]
      summary: List the current account's save slots
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Save slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaveSlot"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saves/{slot}:
    put:
      operationId: putSaveSlot
      tags: [saves]
      summary: Create or overwrite a save slot
      security:
        - bearerAuth: []
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSlotInput"
      responses:
        "200":
          description: Save slot written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveSlot"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSaveSlot
      tags: [saves]
      summary: Delete a save slot
      security:
        - bearerAuth: []
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 3
      responses:
        "204":
          description: Save slot deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    AuthCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        password:
          type: string
          minLength: 6
          maxLength: 128
    Account:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
        username:
          type: string
    AuthSession:
      type: object
      required: [token, account]
      properties:
        token:
          type: string
        account:
          $ref: "#/components/schemas/Account"
    SaveSlot:
      type: object
      required: [slot, name, summary, state, updatedAt]
      properties:
        slot:
          type: integer
        name:
          type: string
        summary:
          type: string
        state:
          type: object
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time
    SaveSlotInput:
      type: object
      required: [name, summary, state]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        summary:
          type: string
          maxLength: 120
        state:
          type: object
          additionalProperties: true
